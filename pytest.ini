[pytest]
minversion = 7.4
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
qt_api = pyqt6

markers =
    slow: long-running tests (>1 second)
    gui: tests requiring widget instantiation
    benchmark: performance regression tests (run with --benchmark-only)
    property: hypothesis property-based tests
    snapshot: byte-exact snapshot tests
    worker: pytest-qt worker-thread tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

norecursedirs =
    .git .tox dist build *.egg __pycache__
    coverage_html .venv venv env
