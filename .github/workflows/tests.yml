name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Linux job — Ubuntu with xvfb for headless Qt
  # ───────────────────────────────────────────────────────────────────────────
  linux:
    name: Linux (Ubuntu, Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libdbus-1-3 \
            libgl1 \
            libfontconfig1 \
            libnss3 \
            xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt pytest-cov pytest-benchmark pytest-timeout hypothesis syrupy coverage

      - name: Run unittest suite (with coverage)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          coverage run --data-file=.coverage.unittest --source=core,utils,ui,cli --branch -m unittest test_rnv_text_transformer

      - name: Run pytest suite (with coverage)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          coverage run --data-file=.coverage.pytest --source=core,utils,ui,cli --branch -m pytest tests/ --benchmark-disable

      - name: Combine coverage data
        run: |
          coverage combine .coverage.unittest .coverage.pytest

      - name: Print coverage report
        run: |
          coverage report

      - name: Generate coverage XML (for Codecov)
        run: |
          coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: linux
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  # Windows job — native Qt, no display server needed
  # ───────────────────────────────────────────────────────────────────────────
  windows:
    name: Windows (Python 3.13)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt pytest-cov pytest-benchmark pytest-timeout hypothesis syrupy coverage

      - name: Run unittest suite (with coverage)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          coverage run --data-file=.coverage.unittest --source=core,utils,ui,cli --branch -m unittest test_rnv_text_transformer

      - name: Run pytest suite (with coverage)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          coverage run --data-file=.coverage.pytest --source=core,utils,ui,cli --branch -m pytest tests/ --benchmark-disable

      - name: Combine coverage data
        run: |
          coverage combine .coverage.unittest .coverage.pytest

      - name: Print coverage report
        run: |
          coverage report

      - name: Generate coverage XML (for Codecov)
        run: |
          coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: windows
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
